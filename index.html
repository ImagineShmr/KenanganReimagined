<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kenangan Coffee Malaysia</title>
  <meta name="description" content="The fastest growing grab-and-go coffee chain from Indonesia." />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/images/favicon.png" />

<body class="bg-brand-cream text-brand-espresso antialiased selection:bg-brand-red selection:text-white">
